name: Lighthouse CI

on:
  workflow_call:
    inputs:
      urls:
        description: "Comma-separated URLs to audit (e.g., http://localhost:3000/,http://localhost:3000/dashboard)"
        required: true
        type: string
      build-command:
        description: "Command to build the project before auditing"
        required: false
        default: "npm run build"
        type: string
      start-command:
        description: "Command to start the server for auditing (e.g., npm run preview)"
        required: false
        default: ""
        type: string
      config-path:
        description: "Path to lighthouserc.js config file"
        required: false
        default: ".lighthouserc.js"
        type: string
      node-version:
        description: "Node.js version"
        required: false
        default: "22"
        type: string
      package-manager:
        description: "Package manager: npm or pnpm"
        required: false
        default: "npm"
        type: string
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        required: false
        default: "10"
        type: string
    secrets:
      LHCI_GITHUB_APP_TOKEN:
        required: false

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        if: inputs.package-manager == 'pnpm'
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ inputs.urls }}
          configPath: ${{ inputs.config-path }}
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
